# Agent-KB — Neo4j substrate
# Neo4j 5.26 Community LTS: range + fulltext + vector indexes are all native (vector GA since 5.15).
# Volume-persisted via named volumes (survive container restart). Bolt 7688, HTTP 7475.
services:
  neo4j:
    image: neo4j:5.26-community
    container_name: bg-neo4j
    restart: unless-stopped
    ports:
      - "7475:7474"   # HTTP browser
      - "7688:7687"   # Bolt (neo4j-graphrag-python client → A2)
    volumes:
      - bg_neo4j_data:/data
      - bg_neo4j_logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/companybrain          # local dev only — not a secret
      # Neo4j env->config mapping: dot->_, literal _-> __. Defaults are fine for local dev;
      # memory tuning omitted (server.memory.pagecache.size etc. are easy to mis-map and trip strict validation).
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p companybrain 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
volumes:
  bg_neo4j_data:
  bg_neo4j_logs:
